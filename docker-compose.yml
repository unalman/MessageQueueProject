name: message-queue-demo

services:
  rabbitmq:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 24

  paymentapi:
    build:
      context: .
      dockerfile: ./src/PaymentApi/Dockerfile
    ports:
      - "5082:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080

  orderapi:
    build:
      context: .
      dockerfile: ./src/OrderApi/Dockerfile
    ports:
      - "5081:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      PaymentApi__BaseUrl: http://paymentapi:8080
      RabbitMq__Host: rabbitmq
      RabbitMq__User: guest
      RabbitMq__Pass: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      paymentapi:
        condition: service_started

  emailworker:
    build:
      context: .
      dockerfile: ./src/EmailWorker/Dockerfile
    environment:
      RabbitMq__Host: rabbitmq
      RabbitMq__User: guest
      RabbitMq__Pass: guest
    depends_on:
      rabbitmq:
        condition: service_healthy

  stockworker:
    build:
      context: .
      dockerfile: ./src/StockWorker/Dockerfile
    environment:
      RabbitMq__Host: rabbitmq
      RabbitMq__User: guest
      RabbitMq__Pass: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
